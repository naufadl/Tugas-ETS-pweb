<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Produk — BLUANJA★</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    const _t = localStorage.getItem('bluanja_theme') || 'light';
    if (_t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  </script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html">
      <img src="assets/logo.png" alt="logo" class="logo-img">
    </a>
    <div class="nav-search">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Search here...">
    </div>
    <div class="nav-actions">
      <img src="assets/profile.png" class="icon">
      <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
      <a href="cart.html" class="nav-icon-wrap">
        <img src="assets/cart.png" class="icon">
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
    </div>
  </nav>

  <!-- BREADCRUMB -->
  <div class="breadcrumb fade-up">
    <a href="index.html">Home</a>
    <span class="sep">›</span>
    <span id="bcCategory">—</span>
    <span class="sep">›</span>
    <span id="bcName">—</span>
  </div>

  <!-- DETAIL LAYOUT -->
  <div class="detail-layout">

    <!-- LEFT: IMAGE — diisi oleh JS -->
    <div class="detail-img-col fade-up fade-up-d1">
      <div class="detail-main-img" id="mainImgWrap">
        <!-- Diisi JS -->
      </div>
      <div class="detail-thumbs" id="thumbsRow"></div>
    </div>

    <!-- RIGHT: INFO -->
    <div class="detail-info-col fade-up fade-up-d2">
      <div class="detail-cat-row">
        <div class="detail-cat" id="detailCat">—</div>
      </div>
      <div class="detail-name" id="detailName">—</div>
      <div class="detail-price" id="detailPrice">—</div>
      <div class="detail-rating-row">
        <span class="stars" id="detailStars">★★★★★</span>
        <span id="detailRating">—</span>
        <span>|</span>
        <span id="detailReviews">—</span>
      </div>
      <div class="detail-divider"></div>
      <div class="detail-desc" id="detailDesc">—</div>
      <div class="detail-stock-info">
        Stok tersedia: <span id="detailStock">—</span>
      </div>
      <div class="qty-control">
        <span style="font-size:14px;font-weight:600;color:var(--text-muted)">Qty:</span>
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <span class="qty-val" id="qtyVal">1</span>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
      <button class="detail-add-btn" id="addBtn" onclick="addToCart()">
        🛒 ADD TO CART
      </button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    function updateCartBadge() {
      const cart = JSON.parse(localStorage.getItem('bluanja_cart') || '[]');
      document.getElementById('cartBadge').textContent = cart.reduce((s, i) => s + i.qty, 0);
    }

    // Helper: selalu kembalikan array gambar
    function getImages(p) {
      if (Array.isArray(p.image)) return p.image;
      if (typeof p.image === 'string') return [p.image];
      return [];
    }

    function setMainImg(src, alt) {
      document.getElementById('mainImgWrap').innerHTML = `
        <img src="${src}" alt="${alt}"
             style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius)"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span style="font-size:80px;display:none;align-items:center;justify-content:center;width:100%;height:100%;">📦</span>
      `;
    }

    const params = new URLSearchParams(window.location.search);
    const product = products.find(p => p.id === parseInt(params.get('id')));
    let qty = 1;

    function changeQty(delta) {
      if (!product) return;
      qty = Math.max(1, Math.min(qty + delta, product.stock));
      document.getElementById('qtyVal').textContent = qty;
    }

    function addToCart() {
      if (!product) return;
      let cart = JSON.parse(localStorage.getItem('bluanja_cart') || '[]');
      const idx = cart.findIndex(i => i.id === product.id);
      if (idx > -1) cart[idx].qty += qty;
      else cart.push({ id: product.id, qty });
      localStorage.setItem('bluanja_cart', JSON.stringify(cart));
      updateCartBadge();
      const btn = document.getElementById('addBtn');
      btn.textContent = '✓ Ditambahkan ke Keranjang!';
      setTimeout(() => btn.innerHTML = '🛒 ADD TO CART', 1500);
    }

    function selectThumb(el, imgSrc) {
      document.querySelectorAll('.detail-thumb').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      setMainImg(imgSrc, product.name);
    }

    if (product) {
      const images = getImages(product);

      document.title = product.name + ' — BLUANJA★';
      document.getElementById('bcCategory').textContent = product.category;
      document.getElementById('bcName').textContent = product.name;
      document.getElementById('detailCat').textContent = product.category;
      document.getElementById('detailName').textContent = product.name;
      document.getElementById('detailPrice').textContent = 'Rp ' + product.price.toLocaleString('id-ID');
      document.getElementById('detailRating').textContent = product.rating;
      document.getElementById('detailReviews').textContent = product.reviews + ' reviews';
      document.getElementById('detailDesc').textContent = product.description;
      document.getElementById('detailStock').textContent = product.stock;

      // Tampilkan gambar utama
      setMainImg(images[0], product.name);

      // Tampilkan thumbnails (hanya jika ada lebih dari 1 gambar)
      if (images.length > 1) {
        document.getElementById('thumbsRow').innerHTML = images.map((img, i) => `
          <div class="detail-thumb ${i === 0 ? 'active' : ''}" onclick="selectThumb(this, '${img}')">
            <img src="${img}" alt="thumb ${i+1}"
                 style="width:100%;height:100%;object-fit:cover;border-radius:7px"
                 onerror="this.style.display='none'">
          </div>
        `).join('');
      }

    } else {
      document.getElementById('detailName').textContent = 'Produk tidak ditemukan';
    }

    updateCartBadge();
  </script>

  <script>
    const toggle = document.getElementById('themeToggle');
    if (localStorage.getItem('bluanja_theme') === 'dark') toggle.textContent = '☀️';
    toggle.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      toggle.textContent = isDark ? '🌙' : '☀️';
      localStorage.setItem('bluanja_theme', isDark ? 'light' : 'dark');
    });
  </script>

</body>
</html>
