<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keranjang — BLUANJA★</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    const _t = localStorage.getItem('bluanja_theme') || 'light';
    if (_t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  </script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html">
      <img src="assets/logo.png" alt="logo" class="logo-img">
    </a>
    <div class="nav-search">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Search here...">
    </div>
    <div class="nav-actions">
      <img src="assets/profile.png" class="icon">
      <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
      <a href="cart.html" class="nav-icon-wrap">
        <img src="assets/cart.png" class="icon">
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
    </div>
  </nav>

  <!-- BREADCRUMB -->
  <div class="breadcrumb fade-up">
    <a href="index.html">Home</a>
    <span class="sep">›</span>
    <span>Keranjang</span>
  </div>

  <!-- CART LAYOUT -->
  <div class="cart-layout">

    <!-- LEFT: ITEMS -->
    <div class="cart-items-col fade-up fade-up-d1">
      <div class="cart-col-title" id="cartTitle">Keranjang</div>
      <div id="cartItemsContainer"></div>
    </div>

    <!-- RIGHT: SUMMARY -->
    <div class="cart-summary fade-up fade-up-d2" id="summaryPanel">
      <div class="summary-title">Ringkasan Belanja</div>
      <div class="summary-row">
        <span id="summaryItemLabel">Total Produk (0 item)</span>
        <span id="summarySubtotal">Rp 0</span>
      </div>
      <div class="summary-row">
        <span>Ongkir</span>
        <span>Rp 0</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-total">
        <span>TOTAL</span>
        <span class="amount" id="summaryTotal">Rp 0</span>
      </div>
      <button class="checkout-btn" onclick="handleCheckout()">CHECKOUT →</button>
      <a href="index.html" class="continue-link">← Lanjut Belanja</a>
    </div>

  </div>

  <script src="js/data.js"></script>
  <script>
    function formatRp(n) {
      return 'Rp ' + n.toLocaleString('id-ID');
    }

    // Helper: ambil gambar pertama, support array maupun string
    function getThumb(p) {
      return Array.isArray(p.image) ? p.image[0] : p.image;
    }

    function updateCartBadge() {
      const cart = JSON.parse(localStorage.getItem('bluanja_cart') || '[]');
      document.getElementById('cartBadge').textContent = cart.reduce((s, i) => s + i.qty, 0);
    }

    function renderCart() {
      const cart = JSON.parse(localStorage.getItem('bluanja_cart') || '[]');
      const container = document.getElementById('cartItemsContainer');
      const summaryPanel = document.getElementById('summaryPanel');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🛒</div>
            <h3>Keranjang Masih Kosong</h3>
            <p>Yuk, temukan produk favoritmu!</p>
            <a href="index.html">Mulai Belanja</a>
          </div>`;
        summaryPanel.style.opacity = '0.5';
        summaryPanel.style.pointerEvents = 'none';
        updateSummary(0, 0);
        return;
      }

      let totalItems = 0;
      let totalPrice = 0;

      container.innerHTML = cart.map(item => {
        const p = products.find(x => x.id === item.id);
        if (!p) return '';
        totalItems += item.qty;
        totalPrice += p.price * item.qty;
        const thumb = getThumb(p);
        return `
          <div class="cart-item fade-up" id="cart-item-${p.id}">
            <div class="cart-item-img">
              <img src="${thumb}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;"
                   onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
              <span style="font-size:56px;display:none;align-items:center;justify-content:center;width:100%;height:100%;">📦</span>
            </div>
            <div class="cart-item-info">
              <div class="cart-item-cat">${p.category}</div>
              <div class="cart-item-name">${p.name}</div>
              <div class="cart-item-bottom">
                <div class="qty-control">
                  <button class="qty-btn" onclick="changeQty(${p.id}, -1)">−</button>
                  <span class="qty-val" id="qty-${p.id}">${item.qty}</span>
                  <button class="qty-btn" onclick="changeQty(${p.id}, 1)">+</button>
                </div>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
              <div class="cart-item-price" id="price-${p.id}">${formatRp(p.price * item.qty)}</div>
              <button class="cart-remove-btn" onclick="removeItem(${p.id})" title="Hapus">✕</button>
            </div>
          </div>`;
      }).join('');

      summaryPanel.style.opacity = '1';
      summaryPanel.style.pointerEvents = 'auto';
      document.getElementById('cartTitle').textContent = `Keranjang (${totalItems} item)`;
      updateSummary(totalItems, totalPrice);
      updateCartBadge();
    }

    function updateSummary(totalItems, totalPrice) {
      document.getElementById('summaryItemLabel').textContent = `Total Produk (${totalItems} item)`;
      document.getElementById('summarySubtotal').textContent = formatRp(totalPrice);
      document.getElementById('summaryTotal').textContent = formatRp(totalPrice);
    }

    function changeQty(id, delta) {
      let cart = JSON.parse(localStorage.getItem('bluanja_cart') || '[]');
      const idx = cart.findIndex(i => i.id === id);
      if (idx === -1) return;
      const p = products.find(x => x.id === id);
      cart[idx].qty = Math.max(1, Math.min(cart[idx].qty + delta, p.stock));
      localStorage.setItem('bluanja_cart', JSON.stringify(cart));
      renderCart();
    }

    function removeItem(id) {
      let cart = JSON.parse(localStorage.getItem('bluanja_cart') || '[]');
      localStorage.setItem('bluanja_cart', JSON.stringify(cart.filter(i => i.id !== id)));
      renderCart();
    }

    function handleCheckout() {
      const cart = JSON.parse(localStorage.getItem('bluanja_cart') || '[]');
      if (cart.length === 0) return;
      alert('✅ Pesanan berhasil dibuat! Terima kasih sudah belanja di BLUANJA★');
      localStorage.removeItem('bluanja_cart');
      renderCart();
    }

    renderCart();
    updateCartBadge();
  </script>

  <script>
    const toggle = document.getElementById('themeToggle');
    if (localStorage.getItem('bluanja_theme') === 'dark') toggle.textContent = '☀️';
    toggle.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      toggle.textContent = isDark ? '🌙' : '☀️';
      localStorage.setItem('bluanja_theme', isDark ? 'light' : 'dark');
    });
  </script>

</body>
</html>
